# Local development infrastructure for lametrader.
#
#   docker compose -f infra/docker-compose.yml up -d           # MongoDB only
#   docker compose -f infra/docker-compose.yml --profile tools up -d   # + mongo-express UI
#   docker compose -f infra/docker-compose.yml --profile app   up -d   # + server + web
#
# The default (no profile) brings up just MongoDB, keeping the unit-test +
# `npm run fe:start:dev` loop unchanged. The `app` profile is the full-stack one — the
# NestJS server and web both built from the workspace Dockerfiles.
#
# All settings have sane defaults, so it runs without an .env file. Copy
# .env.example to .env in this folder to override credentials/ports.

name: lametrader

services:
  mongo:
    image: mongo:8
    container_name: lametrader-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-lametrader}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-lametrader}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-lametrader}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Optional web admin UI for MongoDB. Opt-in via `--profile tools`.
  mongo-express:
    image: mongo-express:1.0.2
    container_name: lametrader-mongo-express
    profiles: ["tools"]
    restart: unless-stopped
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-lametrader}:${MONGO_PASSWORD:-lametrader}@mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy

  # NestJS backend. Opt-in via `--profile app`. Build context is the repo root so
  # the Dockerfile can `npm ci` the full workspace. It runs the live poll loop +
  # rule engine on boot, so the poll cadence, notification destinations, and
  # logging are all env-driven (defaults apply when unset).
  server:
    profiles: ["app"]
    container_name: lametrader-server
    build:
      context: ..
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      MONGODB_URI: mongodb://${MONGO_USER:-lametrader}:${MONGO_PASSWORD:-lametrader}@mongo:27017/${MONGO_DB:-lametrader}?authSource=admin
      PORT: "3000"
      NODE_ENV: production
      POLL_INTERVALS: ${POLL_INTERVALS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_SCOPES: ${LOG_SCOPES:-}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mongo:
        condition: service_healthy

  # Web SPA served by nginx, with `/api/*` reverse-proxied to the server —
  # the browser sees one origin, so no CORS is needed. Opt-in via `--profile app`.
  web:
    profiles: ["app"]
    container_name: lametrader-web
    build:
      context: ..
      dockerfile: packages/ui/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo-data:
    name: lametrader-mongo-data
