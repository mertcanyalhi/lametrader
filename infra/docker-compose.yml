# Local development infrastructure for lametrader.
#
#   docker compose -f infra/docker-compose.yml up -d           # MongoDB
#   docker compose -f infra/docker-compose.yml --profile tools up -d   # + mongo-express UI
#
# All settings have sane defaults, so it runs without an .env file. Copy
# .env.example to .env in this folder to override credentials/ports.

name: lametrader

services:
  mongo:
    image: mongo:8
    container_name: lametrader-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-lametrader}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-lametrader}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-lametrader}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Optional web admin UI for MongoDB. Opt-in via `--profile tools`.
  mongo-express:
    image: mongo-express:1.0.2
    container_name: lametrader-mongo-express
    profiles: ["tools"]
    restart: unless-stopped
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-lametrader}:${MONGO_PASSWORD:-lametrader}@mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
    name: lametrader-mongo-data
