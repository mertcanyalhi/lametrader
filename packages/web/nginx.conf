# Web SPA + reverse proxy in front of the api.
#
# `/`        -> Vite static bundle (SPA fallback to index.html for client routes).
# `/api/*`   -> stripped of the prefix and proxied to the `api` service on 3000,
#               so the browser sees one origin and no CORS is needed.
# WebSocket  -> the api uses upgrade-style WS (`/symbols/.../backfill/progress`,
#               `/stream` once added), so the proxy passes the `Upgrade` headers
#               through.

upstream api_upstream {
  server api:3000;
}

# `Connection: upgrade` only when the client sent `Upgrade`, otherwise keep-alive.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Static SPA — unknown paths fall back to index.html so client-side routing
  # works on deep links / refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Hashed Vite assets are immutable — let browsers cache them aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Reverse-proxy hop. `rewrite` strips `/api` so the api's routes (mounted at
  # root, e.g. `/config`) keep their existing paths. `Upgrade`/`Connection`
  # headers carry WebSocket handshakes through.
  location /api/ {
    rewrite ^/api/?(.*)$ /$1 break;
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
}
