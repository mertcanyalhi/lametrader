<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>lametrader</title>
    <script>
      // Apply the persisted theme before React paints so the app never flashes
      // the wrong palette. The `main.tsx` `applyInitialTheme` re-runs after
      // mount but the class is already correct from this inline call.
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
      } catch (_) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
