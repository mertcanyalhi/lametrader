<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>lametrader</title>
    <script>
      // Apply the persisted theme before React paints so the app never flashes
      // the wrong palette. `main.tsx`'s `applyInitialTheme` re-runs after
      // mount but the class is already correct from this inline call.
      //
      // This script runs BEFORE the JS bundle loads, so the Pino logger
      // (`lib/log.ts`) isn't available yet. `console.warn` is the only tool
      // here — an intentional, documented exception to the "no ad-hoc
      // `console.*`" rule in `packages/web/CLAUDE.md`.
      (() => {
        let t = null;
        try {
          t = localStorage.getItem('theme');
        } catch (cause) {
          console.warn('[web/theme-bootstrap] localStorage unavailable; defaulting to dark', cause);
        }
        if (t === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
