name: CI

# Gates (see CLAUDE.md), arranged so each commit runs CI once:
# - pull_request -> `check:full` (+ e2e, Testcontainers/Mongo) — the pre-merge gate
# - push to main -> `check`      (typecheck + lint + unit) — cheap post-merge safety net
#
# `push` is scoped to main so a PR commit triggers only the pull_request run
# (previously push + pull_request both fired, duplicating the unit/typecheck/lint
# work that check:full already covers). Docs-only changes skip CI entirely.
on:
  pull_request:
    paths-ignore: ['**.md', 'docs/**', 'specs/**']
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'specs/**']

# Cancel superseded runs on the same ref (saves minutes on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: check (typecheck + lint + unit)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check

  check-full:
    name: check:full (+ e2e)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Ubuntu runners ship Docker, so Testcontainers spins Mongo for the e2e tier.
      - run: npm run check:full
